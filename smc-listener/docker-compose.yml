version: '3.8'

services:
  smc-listener:
    build: .
    container_name: smc-sqs-listener
    restart: unless-stopped
    environment:
      - SQS_QUEUE_URL=${SQS_QUEUE_URL}
      - SQS_ACCESS_KEY=${SQS_ACCESS_KEY}
      - SQS_SECRET_ACCESS_KEY=${SQS_SECRET_ACCESS_KEY}
      - SQS_REGION=${SQS_REGION:-eu-north-1}
      - NEXTJS_WEBHOOK_URL=${NEXTJS_WEBHOOK_URL}
      - SERVICE_BUS_REVALIDATE_SECRET=${SERVICE_BUS_REVALIDATE_SECRET}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
